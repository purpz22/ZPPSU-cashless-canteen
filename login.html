<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZPPSU Food Court - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<!-- Added p-4 for side margins on mobile & min-h-[100dvh] for perfect vertical centering on phones -->
<body class="bg-gray-50 flex items-center justify-center min-h-[100dvh] p-4">
  <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl overflow-hidden">
    
    <!-- Header (Adjusted padding for smaller screens) -->
    <div class="bg-red-700 text-white py-8 px-4 sm:p-8 text-center">
      <h1 class="text-4xl font-bold tracking-wider">ZPPSU</h1>
      <p class="text-2xl mt-1">Food Court</p>
      <p class="text-sm mt-2 opacity-80">Cashless • GCash • Maya</p>
    </div>

    <!-- MAIN LOGIN (Student & Staff) -->
    <div id="main-login-forms" class="p-6 sm:p-8" style="display: block;">
      
      <!-- Student Login -->
      <div class="mb-8">
        <h2 class="text-xl font-bold text-gray-800 mb-4">🎓 Student Login</h2>
        <input type="text" id="studentNumber" 
               placeholder="ZPPSU Student Number (e.g. 2024-123)"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-red-700 transition-colors">
        <button onclick="studentLogin()" 
                class="w-full mt-4 bg-red-700 hover:bg-red-800 transition-colors py-4 rounded-2xl text-white font-bold text-xl shadow-md">
          Login as Student
        </button>
      </div>

      <div class="h-px bg-gray-200 my-6"></div>

      <!-- Staff Login -->
      <div>
        <h2 class="text-xl font-bold text-gray-800 mb-4">👨‍🍳 Stall Owner Login</h2>
        <input type="email" id="staffEmail" 
               placeholder="Staff Email"
               class="w-full px-5 py-4 mb-3 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-green-600 transition-colors">
        <input type="password" id="staffPassword" 
               placeholder="Password"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-green-600 transition-colors">
        
        <button onclick="staffLogin()" id="btn-staff-login"
                class="w-full mt-4 bg-green-600 hover:bg-green-700 transition-colors py-4 rounded-2xl text-white font-bold text-xl shadow-md">
          Secure Login as Staff
        </button>
      </div>
    </div>

    <!-- SECURE ADMIN LOGIN (Hidden by default) -->
    <div id="admin-login-form" class="p-6 sm:p-8" style="display: none;">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">🛡️ Admin Portal</h2>
      <p class="text-sm text-gray-500 mb-6">Secure login via Firebase Auth</p>
      
      <input type="email" id="adminEmail" 
             placeholder="Admin Email"
             class="w-full px-5 py-4 mb-3 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-blue-600 transition-colors">
             
      <input type="password" id="adminPassword" 
             placeholder="Password"
             class="w-full px-5 py-4 mb-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-blue-600 transition-colors">
             
      <button onclick="adminLogin()" id="btn-admin-login"
              class="w-full bg-blue-600 hover:bg-blue-700 transition-colors py-4 rounded-2xl text-white font-bold text-xl shadow-md">
        Secure Login
      </button>
      
      <button onclick="toggleAdmin()" class="w-full mt-4 text-gray-500 font-bold hover:text-gray-800 py-2 transition-colors">
        ← Back to Main Login
      </button>
    </div>

    <!-- Footer with hidden toggle -->
    <div class="bg-gray-50 p-6 flex justify-between items-center text-xs text-gray-500 border-t border-gray-100">
      <span>ZPPSU Cashless Canteen © 2026</span>
      <button onclick="toggleAdmin()" class="font-bold hover:text-red-700 cursor-pointer transition-colors">Admin Panel</button>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  
  <script>

// Change this number ONLY when you make a new .apk in Android Studio!
const THIS_APP_VERSION = "1.1.0"; 

// Check Firebase for forced updates
db.collection("settings").doc("app_info").get().then((doc) => {
    if (doc.exists) {
        const data = doc.data();
        if (data.latest_version !== THIS_APP_VERSION) {
            // The versions don't match! Force the update.
            showUpdateScreen(data.download_url);
        }
    }
});

function showUpdateScreen(url) {
    // Hide the login forms
    document.getElementById("main-login-forms").style.display = "none";
    
    // Create the update screen
    const updateHTML = `
        <div style="text-align:center; padding: 40px 20px;">
            <h1 style="font-size: 50px; margin-bottom: 10px;">🚀</h1>
            <h2 style="font-size: 24px; font-weight: bold; color: #b91c1c;">Update Required</h2>
            <p style="color: #666; margin-top: 10px; margin-bottom: 30px;">
                A new version of the ZPPSU Canteen App is available! You must update to continue using the app.
            </p>
            <a href="${url}" style="background: #b91c1c; color: white; padding: 15px 30px; border-radius: 15px; font-weight: bold; text-decoration: none; display: inline-block; width: 100%;">
                Download Update Now
            </a>
        </div>
    `;
    
    // Insert it into the page
    document.getElementById("main-login-forms").insertAdjacentHTML('afterend', updateHTML);
}

    window.onload = () => {
      document.getElementById('studentNumber').focus();
    };

    function studentLogin() {
      const num = document.getElementById('studentNumber').value.trim();
      if (num.length > 3) {
        localStorage.setItem('studentNumber', num);
        localStorage.setItem('role', 'student');
        window.location.href = 'index.html';
      } else {
        alert("Please enter a valid Student Number");
      }
    }

    async function staffLogin() {
      const email = document.getElementById('staffEmail').value.trim().toLowerCase();
      const password = document.getElementById('staffPassword').value;

      if (!email || !password) return alert("Enter email and password");

      const btn = document.getElementById('btn-staff-login');
      btn.innerText = "Authenticating...";
      btn.disabled = true;

      try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;

        const snapshot = await db.collection('vendors').where('email', '==', user.email).get();

        if (!snapshot.empty) {
          const stallDoc = snapshot.docs[0];
          localStorage.setItem('role', 'staff');
          localStorage.setItem('vendorId', stallDoc.id);
          window.location.href = 'staff.html';
        } else {
          auth.signOut();
          alert("Login successful, but no stall is assigned to this email. Contact Admin.");
          btn.innerText = "Secure Login as Staff";
          btn.disabled = false;
        }

      } catch (error) {
        console.error("Staff Login Error:", error);
        alert("Login Failed: Incorrect Email or Password.");
        btn.innerText = "Secure Login as Staff";
        btn.disabled = false;
      }
    }

    function toggleAdmin() {
      const mainForm = document.getElementById('main-login-forms');
      const adminForm = document.getElementById('admin-login-form');
      
      if (mainForm.style.display === 'block') {
        mainForm.style.display = 'none';
        adminForm.style.display = 'block';
      } else {
        mainForm.style.display = 'block';
        adminForm.style.display = 'none';
      }
    }

    async function adminLogin() {
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;
      
      if (!email || !password) return alert("Please enter email and password.");

      const btn = document.getElementById('btn-admin-login');
      btn.innerText = "Authenticating...";
      btn.disabled = true;

      try {
        await auth.signInWithEmailAndPassword(email, password);
        localStorage.setItem('role', 'admin');
        window.location.href = 'admin.html';
      } catch (error) {
        console.error(error);
        alert("Login Failed: " + error.message);
        btn.innerText = "Secure Login";
        btn.disabled = false;
      }
    }

    function showLogoutModal() {
        document.getElementById('logout-modal').style.display = 'flex';
    }

    function hideLogoutModal() {
        document.getElementById('logout-modal').style.display = 'none';
    }

    function confirmLogout() {
        localStorage.clear();
        window.location.replace("login.html");
    }
  </script>
  
  <div id="logout-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:20px; width:80%; max-width:300px; text-align:center;">
        <p style="color:black; font-weight:bold; margin-bottom:20px;">Are you sure you want to log out?</p>
        <div style="display:flex; gap:10px;">
            <button onclick="hideLogoutModal()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#ccc;">Cancel</button>
            <button onclick="confirmLogout()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#dc2626; color:white;">Yes</button>
        </div>
    </div>
  </div>
</body>
</html>
