<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZPPSU Food Court - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
  <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl overflow-hidden">
    
    <!-- Header -->
    <div class="bg-red-700 text-white p-8 text-center">
      <h1 class="text-4xl font-bold">ZPPSU</h1>
      <p class="text-2xl mt-1">Food Court</p>
      <p class="text-sm mt-2 opacity-80">Cashless • GCash • Maya</p>
    </div>

    <!-- MAIN LOGIN (Student & Staff) -->
    <div id="main-login-forms" class="p-8" style="display: block;">
      
      <!-- Student Login -->
      <div class="mb-8">
        <h2 class="text-xl font-bold text-gray-800 mb-4">🎓 Student Login</h2>
        <input type="text" id="studentNumber" 
               placeholder="ZPPSU Student Number (e.g. 2024-123)"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-red-700">
        <button onclick="studentLogin()" 
                class="w-full mt-4 bg-red-700 hover:bg-red-800 py-4 rounded-2xl text-white font-bold text-xl">
          Login as Student
        </button>
      </div>

      <div class="h-px bg-gray-200 my-6"></div>

      <!-- Staff Login -->
      <div>
        <h2 class="text-xl font-bold text-gray-800 mb-4">👨‍🍳 Stall Owner Login</h2>
        <input type="email" id="staffEmail" 
               placeholder="Staff Email"
               class="w-full px-5 py-4 mb-3 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-green-600">
        <input type="password" id="staffPassword" 
               placeholder="Password"
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-green-600">
        
        <button onclick="staffLogin()" id="btn-staff-login"
                class="w-full mt-4 bg-green-600 hover:bg-green-700 py-4 rounded-2xl text-white font-bold text-xl">
          Secure Login as Staff
        </button>
      </div>
    </div>

    <!-- SECURE ADMIN LOGIN (Hidden by default) -->
    <div id="admin-login-form" class="p-8" style="display: none;">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">🛡️ Admin Portal</h2>
      <p class="text-sm text-gray-500 mb-6">Secure login via Firebase Auth</p>
      
      <input type="email" id="adminEmail" 
             placeholder="Admin Email"
             class="w-full px-5 py-4 mb-3 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-blue-600">
             
      <input type="password" id="adminPassword" 
             placeholder="Password"
             class="w-full px-5 py-4 mb-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-blue-600">
             
      <button onclick="adminLogin()" id="btn-admin-login"
              class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl text-white font-bold text-xl shadow-md">
        Secure Login
      </button>
      
      <button onclick="toggleAdmin()" class="w-full mt-4 text-gray-500 font-bold hover:text-gray-800 py-2">
        ← Back to Main Login
      </button>
    </div>

    <!-- Footer with hidden toggle -->
    <div class="bg-gray-50 p-6 flex justify-between items-center text-xs text-gray-500">
      <span>ZPPSU Cashless Canteen © 2026</span>
      <button onclick="toggleAdmin()" class="font-bold hover:text-red-700 cursor-pointer">Admin Panel</button>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  
  <script>
    // Focus on student input when page loads
    window.onload = () => {
      document.getElementById('studentNumber').focus();
    };

    function studentLogin() {
      const num = document.getElementById('studentNumber').value.trim();
      if (num.length > 3) {
        localStorage.setItem('studentNumber', num);
        localStorage.setItem('role', 'student');
        window.location.href = 'index.html';
      } else {
        alert("Please enter a valid Student Number");
      }
    }

    async function staffLogin() {
      const email = document.getElementById('staffEmail').value.trim().toLowerCase();
      const password = document.getElementById('staffPassword').value;

      if (!email || !password) return alert("Enter email and password");

      const btn = document.getElementById('btn-staff-login');
      btn.innerText = "Authenticating...";
      btn.disabled = true;

      try {
        // 1. Log in via Firebase Auth
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // 2. Find which stall belongs to this email in Firestore
        const snapshot = await db.collection('vendors').where('email', '==', user.email).get();

        if (!snapshot.empty) {
          // Success! We found the stall.
          const stallDoc = snapshot.docs[0];
          localStorage.setItem('role', 'staff');
          localStorage.setItem('vendorId', stallDoc.id);
          window.location.href = 'staff.html';
        } else {
          auth.signOut();
          alert("Login successful, but no stall is assigned to this email. Contact Admin.");
          btn.innerText = "Secure Login as Staff";
          btn.disabled = false;
        }

      } catch (error) {
        console.error("Staff Login Error:", error);
        alert("Login Failed: Incorrect Email or Password.");
        btn.innerText = "Secure Login as Staff";
        btn.disabled = false;
      }
    }

    // Toggle between Main Login and Admin Login
    function toggleAdmin() {
      const mainForm = document.getElementById('main-login-forms');
      const adminForm = document.getElementById('admin-login-form');
      
      if (mainForm.style.display === 'block') {
        // Hide Main, Show Admin
        mainForm.style.display = 'none';
        adminForm.style.display = 'block';
      } else {
        // Show Main, Hide Admin
        mainForm.style.display = 'block';
        adminForm.style.display = 'none';
      }
    }

    // SECURE FIREBASE ADMIN LOGIN
    async function adminLogin() {
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;
      
      if (!email || !password) return alert("Please enter email and password.");

      const btn = document.getElementById('btn-admin-login');
      btn.innerText = "Authenticating...";
      btn.disabled = true;

      try {
        await auth.signInWithEmailAndPassword(email, password);
        localStorage.setItem('role', 'admin');
        window.location.href = 'admin.html';
      } catch (error) {
        console.error(error);
        alert("Login Failed: " + error.message);
        btn.innerText = "Secure Login";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
