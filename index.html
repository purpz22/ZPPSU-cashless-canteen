<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  
  <title>ZPPSU Cashless Canteen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 min-h-[100dvh]">
  <div class="max-w-md mx-auto bg-white min-h-[100dvh] shadow-xl relative pb-20">
    
    <!-- Updated Header with Top Padding (pt-10) for Mobile Status Bars -->
    <header class="bg-red-700 text-white px-5 pt-10 pb-5 flex justify-between items-center shadow-md rounded-b-2xl">
      <div>
        <h1 class="text-2xl font-bold tracking-wide">ZPPSU CANTEEN</h1>
        <p class="text-sm opacity-90 font-medium mt-1">Cashless Menu</p>
      </div>
      <button onclick="showLogoutModal()" class="bg-red-800 hover:bg-red-900 px-4 py-2 rounded-xl text-sm font-bold transition-colors shadow-sm">
        🚪 Logout
      </button>
    </header>    

    <!-- Added pb-24 so the floating cart doesn't block the bottom content -->
    <div id="content" class="p-5 pb-24"></div>

    <!-- Floating Cart -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 max-w-md mx-auto rounded-t-3xl shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
      <button onclick="showCart()" class="w-full bg-green-600 hover:bg-green-700 transition-colors text-white py-4 rounded-2xl text-lg font-bold shadow-md">
        View Cart (<span id="cart-count">0</span>)
      </button>
    </div>
  </div>

<!-- Floating AI Chat Button -->
<button onclick="toggleChat()" class="fixed bottom-24 right-4 bg-white p-1 rounded-full shadow-2xl z-40 transition-transform transform hover:scale-110 border-4 border-purple-600 focus:outline-none flex items-center justify-center">
  <!-- CHANGE THE 'src' LINK BELOW TO YOUR OWN IMAGE IF YOU WANT -->
  <img src="https://api.dicebear.com/7.x/bottts/svg?seed=ZPPSU&backgroundColor=c084fc" alt="AI Bot" class="w-12 h-12 rounded-full object-cover">
</button>

<!-- AI Chat Window (Hidden by default) -->
<div id="ai-chat-window" class="fixed bottom-24 right-4 sm:right-4 w-[90%] sm:w-80 h-[400px] bg-white rounded-3xl shadow-2xl z-50 flex flex-col hidden overflow-hidden border border-gray-200">
  
  <!-- Chat Header (Now includes the avatar image!) -->
  <div class="bg-purple-600 text-white p-4 flex justify-between items-center shadow-md">
    <div class="flex items-center gap-3">
      <!-- SAME IMAGE HERE -->
      <img src="https://api.dicebear.com/7.x/bottts/svg?seed=ZPPSU&backgroundColor=c084fc" alt="AI Bot" class="w-10 h-10 rounded-full border-2 border-white bg-white">
      <div>
        <h3 class="font-bold text-lg leading-tight">ZPPSU AI</h3>
        <p class="text-xs opacity-90">Ask me about food!</p>
      </div>
    </div>
    <button onclick="toggleChat()" class="text-white hover:text-gray-200 font-bold text-xl transition-colors">✖</button>
  </div>
  
  <!-- Chat Messages Area -->
  <div id="chat-box" class="flex-1 p-4 overflow-y-auto bg-gray-50 flex flex-col gap-3 text-sm">
    <div class="bg-white border border-gray-200 text-gray-800 p-3 rounded-2xl rounded-tl-none self-start max-w-[85%] shadow-sm flex items-start gap-2">
      <!-- Tiny Avatar next to the welcome message -->
      <img src="https://api.dicebear.com/7.x/bottts/svg?seed=ZPPSU&backgroundColor=c084fc" class="w-6 h-6 rounded-full flex-shrink-0 mt-0.5">
      <span>Hello! I'm the ZPPSU AI Assistant. What are you craving today?</span>
    </div>
  </div>
  
  <!-- Chat Input -->
  <div class="p-3 bg-white border-t flex gap-2 items-center">
    <input type="text" id="chat-input" placeholder="Ask something..." class="flex-1 p-3 bg-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm" onkeypress="handleEnter(event)">
    <button onclick="sendMessage()" class="bg-purple-600 hover:bg-purple-700 text-white p-3 rounded-xl shadow-md transition-colors">
      ➤
    </button>
  </div>
</div>

<!-- CUSTOM ALERT MODAL -->
    <div id="custom-alert" style="display: none;" class="fixed inset-0 bg-black bg-opacity-80 z-[99999] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl transform transition-all">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">⚠️</span>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Notice</h3>
            <p id="custom-alert-message" class="text-gray-600 mb-6 text-sm leading-relaxed">Error message goes here.</p>
            <button onclick="closeCustomAlert()" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-4 rounded-xl shadow-md transition-colors">
                OK
            </button>
        </div>
    </div>

  <!-- Firebase + JS -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/vendors.js"></script>
  <script src="assets/js/menu.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/payment.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  

  
  <script>

// --- CUSTOM ALERT FUNCTIONS ---
    function showCustomAlert(message) {
        document.getElementById('custom-alert-message').innerText = message;
        document.getElementById('custom-alert').style.display = 'flex';
    }

    function closeCustomAlert() {
        document.getElementById('custom-alert').style.display = 'none';
    }

    // Auto load vendors when page opens
   window.onload = () => {
  if (localStorage.getItem('role') !== 'student') {
    window.location.href = 'login.html';
    return;
  }
  loadVendors();
  requestNotificationPermission(); 
  initStatusListener();
  const activeOrder = localStorage.getItem('activeOrderId');
if (activeOrder) {
    // Check if the order still exists
    db.collection("orders").doc(activeOrder).get().then(doc => {
        if (doc.exists) {
            // Create a tracking banner at the top of the screen
            const banner = `
              <div onclick="window.location.href='status.html?id=${activeOrder}'" 
                   class="bg-orange-500 text-white p-4 m-4 rounded-xl font-bold text-center shadow-lg cursor-pointer animate-pulse">
                🔔 You have an active order! Click here to track it.
              </div>`;
            document.getElementById('content').insertAdjacentHTML('beforebegin', banner);
        } else {
            // Order was deleted by staff, clear it from phone
            localStorage.removeItem('activeOrderId');
        }
    });
}
};

async function initStatusListener() {
    const studentNumber = localStorage.getItem('studentNumber');
    if (!studentNumber) return;

    // Listen to orders for this student
    db.collection("orders")
        .where("studentNumber", "==", studentNumber)
        .orderBy("timestamp", "desc")
        .limit(1) // Only watch the most recent order
        .onSnapshot((snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "modified") {
                    const order = change.doc.data();
                    
                    if (order.status === "accepted") {
                        if (typeof AndroidInterface !== 'undefined') {
                            // This triggers your Android app's Toast/Notification
                            AndroidInterface.triggerAndroidNotification("Order Ready", "You can pick up now your order!");
                        } else {
                            // This is the fallback for browsers (Chrome/Edge)
                            showCustomAlert("You can pick up now your order!");
                        }
                    }
                }
            });
        });
}
    // Function to show the custom modal
    function showLogoutModal() {
        document.getElementById('logout-modal').style.display = 'flex';
    }

    // Function to hide the custom modal
    function hideLogoutModal() {
        document.getElementById('logout-modal').style.display = 'none';
    }

    // Actual logout logic
    function confirmLogout() {
        localStorage.clear();
        window.location.replace("login.html");
    }
  </script>

  <!-- Logout Modal -->
  <div id="logout-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:24px; border-radius:24px; width:80%; max-width:320px; text-align:center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);">
        <p style="color:black; font-weight:bold; font-size: 1.125rem; margin-bottom:24px;">Are you sure you want to log out?</p>
        <div style="display:flex; gap:12px;">
            <button onclick="hideLogoutModal()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#e5e7eb; color:#374151; font-weight:bold;">Cancel</button>
            <button onclick="confirmLogout()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#dc2626; color:white; font-weight:bold;">Yes, Logout</button>
        </div>
    </div>
  </div>

  <script>

  // Fetch the custom Admin Prompt from Firebase when app loads
  async function fetchAdminPrompt() {
    try {
      const doc = await db.collection('settings').doc('ai_prompt').get();
      if (doc.exists) adminPrompt = doc.data().text;
    } catch (e) { console.error("Could not fetch AI prompt"); }
  }
   let adminPrompt = ""; // Global variable to hold the admin rules

  // Fetch the custom Admin Prompt from Firebase when app loads
  async function fetchAdminPrompt() {
    try {
      const doc = await db.collection('settings').doc('ai_prompt').get();
      if (doc.exists) adminPrompt = doc.data().text;
    } catch (e) { console.error("Could not fetch AI prompt"); }
  }
  fetchAdminPrompt(); // Run immediately

  // Show / Hide Chat window
  function toggleChat() {
    const chat = document.getElementById('ai-chat-window');
    chat.classList.toggle('hidden');
  }

  // Handle Enter keypress
  function handleEnter(e) {
    if (e.key === 'Enter') sendMessage();
  }

  // Send message to AI
  async function sendMessage() {
    const inputField = document.getElementById('chat-input');
    const message = inputField.value.trim();
    if (!message) return;

    const chatBox = document.getElementById('chat-box');

    // 1. Print Student's Message to the chat
    chatBox.innerHTML += `
      <div class="bg-purple-600 text-white p-3 rounded-2xl rounded-tr-none self-end max-w-[85%] shadow-sm ml-auto">
        ${message}
      </div>
    `;
    inputField.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;

    // 2. Print "Thinking..." indicator
    const loadingId = "load-" + Date.now();
    chatBox.innerHTML += `
      <div id="${loadingId}" class="bg-gray-200 text-gray-500 p-3 rounded-2xl rounded-tl-none self-start max-w-[85%] animate-pulse">
        Thinking...
      </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    // 3. Get the Gemini API Key from the Android App
    let apiKey = "";
    if (typeof AndroidInterface !== 'undefined' && AndroidInterface.getGeminiKey) {
        apiKey = AndroidInterface.getGeminiKey();
    } 

    if (!apiKey) {
        document.getElementById(loadingId).remove();
        showCustomAlert("AI features only work inside the official ZPPSU Android App!");
        return;
    }

    // 4. Request AI Response from Google Gemini API
    try {
      // Combine Admin rules + Student question
      const fullPrompt = `${adminPrompt}\n\nStudent asks: ${message}\nAI Answer:`;

      // Make the secure fetch call (using 1.5-flash)
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
              contents: [{ parts: [{ text: fullPrompt }] }]
          })
      });

      if (!response.ok) throw new Error("Google API rejected the request.");

      const data = await response.json();
      const aiReply = data.candidates[0].content.parts[0].text;

      // 5. Remove "Thinking" and Print AI Answer with Avatar
      document.getElementById(loadingId).remove();
      
      // Basic formatting to replace line breaks with <br> tags
      const formattedReply = aiReply.replace(/\n/g, '<br>');

      chatBox.innerHTML += `
        <div class="bg-white border border-gray-200 text-gray-800 p-3 rounded-2xl rounded-tl-none self-start max-w-[85%] shadow-sm flex items-start gap-2">
          <img src="https://api.dicebear.com/7.x/bottts/svg?seed=ZPPSU&backgroundColor=c084fc" class="w-6 h-6 rounded-full flex-shrink-0 mt-0.5">
          <span>${formattedReply}</span>
        </div>
      `;
    } catch (error) {
      console.error(error);
      document.getElementById(loadingId).remove();
      chatBox.innerHTML += `
        <div class="bg-red-100 text-red-600 p-3 rounded-2xl rounded-tl-none self-start max-w-[85%] text-xs">
          Connection Error. Make sure you are using the Android App and have internet.
        </div>
      `;
    }
    
    // Auto-scroll to the bottom
    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
</body>
