<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZPPSU Cashless Canteen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50">
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl">
<!-- Updated Header with Logout Button -->
    <header class="bg-red-700 text-white p-4 flex justify-between items-center shadow-md">
      <div>
        <h1 class="text-2xl font-bold">ZPPSU CANTEEN</h1>
        <p class="text-sm opacity-90">Menu</p>
      </div>
      <button onclick="document.getElementById('logout-modal').style.display = 'flex'">
        🚪 Logout
      </button>
    </header>    <div id="content" class="p-4"></div>

    <!-- Floating Cart -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 max-w-md mx-auto">
      <button onclick="showCart()" class="w-full bg-green-600 text-white py-4 rounded-xl text-lg font-bold">
        Cart (<span id="cart-count">0</span>)
      </button>
    </div>
  </div>

  <!-- Firebase + JS -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/vendors.js"></script>
  <script src="assets/js/menu.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/payment.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script>
    // Auto load vendors when page opens
    window.onload = () => {
      if (localStorage.getItem('role') !== 'student') {
        window.location.href = 'login.html';
        return;
      }
      loadVendors();
    };
     // ADD THIS LOGOUT FUNCTION
function logout() {
  if (confirm("Are you sure you want to log out?")) {
    localStorage.clear();
    
    if (typeof Android !== 'undefined') {
        window.location.href = "login.html"; 
    } else {
        window.location.href = "login.html";
    }
    setTimeout(() => {
        window.location.replace("login.html");
    }, 100);
  }
}

// Function to show the custom modal
function showLogoutModal() {
    document.getElementById('logout-modal').style.display = 'flex';
}

// Function to hide the custom modal
function hideLogoutModal() {
    document.getElementById('logout-modal').style.display = 'none';
}

// Actual logout logic
function confirmLogout() {
    localStorage.clear();
    // Use window.location.replace to prevent Android from getting stuck
    window.location.replace("login.html");
}
  </script>
  <div id="logout-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:20px; width:80%; max-width:300px; text-align:center;">
        <p style="color:black; font-weight:bold; margin-bottom:20px;">Are you sure you want to log out?</p>
        <div style="display:flex; gap:10px;">
            <button onclick="hideLogoutModal()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#ccc;">Cancel</button>
            <button onclick="confirmLogout()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#dc2626; color:white;">Yes</button>
        </div>
    </div>
</div>
</body>
</html>
