<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - ZPPSU</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-3xl shadow-xl">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
      <h1 class="text-3xl font-bold text-red-700">Admin Control Panel</h1>
      <button onclick="document.getElementById('logout-modal').style.display = 'flex'">Logout</button>
    </div>

    <!-- Add New Vendor Form -->
    <div class="bg-gray-50 p-6 rounded-2xl mb-8 border border-gray-200">
      <h2 class="text-xl font-bold mb-4">Add New Food Stall</h2>
      <div class="grid grid-cols-2 gap-4">
        <input type="text" id="v-id" placeholder="Stall ID / Login Code (e.g. jollibee)" class="p-3 border rounded-lg w-full">
        <input type="text" id="v-name" placeholder="Display Name (e.g. Jollibee)" class="p-3 border rounded-lg w-full">
        <input type="email" id="v-email" placeholder="Staff Firebase Email (e.g. jollibee@zppsu.com)" class="p-3 border rounded-lg w-full col-span-2 border-blue-400">
        
        <div>
          <label class="block text-xs font-bold mb-1">Stall Logo Image</label>
          <input type="file" id="v-logo" accept="image/*" class="p-2 border rounded-lg w-full bg-white">
        </div>
        
        <div>
          <label class="block text-xs font-bold mb-1">GCash QR Code Image</label>
          <input type="file" id="v-qr" accept="image/*" class="p-2 border rounded-lg w-full bg-white">
        </div>
      </div>
      <button onclick="addVendor()" id="btn-add-vendor" class="mt-4 bg-green-600 text-white font-bold py-3 px-6 rounded-xl w-full">Create Stall</button>
    </div>

    <!-- Vendor List -->
    <h2 class="text-xl font-bold mb-4">Existing Stalls</h2>
    <div id="admin-vendor-list" class="space-y-4"></div>
  </div>

 <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>

  <script>
    if (localStorage.getItem('role') !== 'admin') window.location.href = 'login.html';

    // THIS IS YOUR COMPRESSION CODE FROM STOREZ
    async function compressImage(file, maxWidth = 800) {
        return new Promise((resolve) => {
            const reader = new FileReader(); 
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image(); 
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; 
                    let height = img.height;
                    if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                    canvas.width = width; 
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true; 
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.80)); // compress to 80% quality
                }
            }
        });
    }

    async function addVendor() {
      const id = document.getElementById('v-id').value.trim().toLowerCase();
      const name = document.getElementById('v-name').value.trim();
      const email = document.getElementById('v-email').value.trim().toLowerCase();
      const logoFile = document.getElementById('v-logo').files[0];
      const qrFile = document.getElementById('v-qr').files[0];

      if(!id || !name || !email || !logoFile || !qrFile) return alert("Please fill all fields and upload both images.");

      const btn = document.getElementById('btn-add-vendor');
      btn.innerText = "Saving to Database...";
      btn.disabled = true;

      try {
        // Compress images to Base64 Text
        const logoData = await compressImage(logoFile, 500); // 500px max width for logo
        const qrData = await compressImage(qrFile, 500);     // 500px max width for QR

        // Save to Database
        await db.collection('vendors').doc(id).set({
          name: name,
          email: email,
          logoUrl: logoData,
          qrUrl: qrData
        });

        alert("Stall created successfully!");
        window.location.reload();
      } catch (e) {
        console.error(e);
        alert("Error creating stall.");
        btn.innerText = "Create Stall";
        btn.disabled = false;
      }
    }

function logout() {
  if (confirm("Are you sure you want to log out?")) {
    localStorage.clear();
    
    if (typeof Android !== 'undefined') {
        window.location.href = "login.html"; 
    } else {
        window.location.href = "login.html";
    }
    setTimeout(() => {
        window.location.replace("login.html");
    }, 100);
  }
}

// Function to show the custom modal
function showLogoutModal() {
    document.getElementById('logout-modal').style.display = 'flex';
}

// Function to hide the custom modal
function hideLogoutModal() {
    document.getElementById('logout-modal').style.display = 'none';
}

// Actual logout logic
function confirmLogout() {
    localStorage.clear();
    // Use window.location.replace to prevent Android from getting stuck
    window.location.replace("login.html");
}
  </script>
  <div id="logout-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:20px; width:80%; max-width:300px; text-align:center;">
        <p style="color:black; font-weight:bold; margin-bottom:20px;">Are you sure you want to log out?</p>
        <div style="display:flex; gap:10px;">
            <button onclick="hideLogoutModal()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#ccc;">Cancel</button>
            <button onclick="confirmLogout()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#dc2626; color:white;">Yes</button>
        </div>
    </div>
</div>
  </body>
</html>
