<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - ZPPSU</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 min-h-[100dvh]">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-3xl shadow-xl">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-6 border-b pb-4">
      <h1 class="text-3xl font-bold text-red-700">Admin Control Panel</h1>
      <button onclick="showLogoutModal()" class="bg-red-100 text-red-700 font-bold px-4 py-2 rounded-xl hover:bg-red-200 transition-colors">
        🚪 Logout
      </button>
    </div>

    <!-- Add New Vendor Form -->
    <div class="bg-gray-50 p-6 rounded-2xl mb-8 border border-gray-200 shadow-inner">
      <h2 class="text-xl font-bold mb-4 text-gray-800">➕ Add New Food Stall</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" id="v-id" placeholder="Stall ID / Login Code (e.g. jollibee)" class="p-3 border-2 border-gray-300 rounded-xl w-full focus:outline-none focus:border-red-500 transition-colors">
        <input type="text" id="v-name" placeholder="Display Name (e.g. Jollibee)" class="p-3 border-2 border-gray-300 rounded-xl w-full focus:outline-none focus:border-red-500 transition-colors">
        <input type="email" id="v-email" placeholder="Staff Firebase Email (e.g. jollibee@zppsu.com)" class="p-3 border-2 border-blue-400 rounded-xl w-full md:col-span-2 focus:outline-none focus:border-blue-600 transition-colors">
        
        <div class="bg-white p-3 border-2 border-gray-300 rounded-xl">
          <label class="block text-xs font-bold mb-1 text-gray-600">Stall Logo Image</label>
          <input type="file" id="v-logo" accept="image/*" class="w-full text-sm">
        </div>
        
        <div class="bg-white p-3 border-2 border-gray-300 rounded-xl">
          <label class="block text-xs font-bold mb-1 text-gray-600">GCash QR Code Image</label>
          <input type="file" id="v-qr" accept="image/*" class="w-full text-sm">
        </div>
      </div>
      <button onclick="addVendor()" id="btn-add-vendor" class="mt-4 bg-green-600 hover:bg-green-700 transition-colors text-white font-bold py-3 px-6 rounded-xl w-full shadow-md">
        Create Stall
      </button>
    </div>

    <!-- Vendor List -->
    <h2 class="text-xl font-bold mb-4 text-gray-800">🏪 Existing Stalls</h2>
    <div id="admin-vendor-list" class="space-y-4">
      <p class="text-gray-500 animate-pulse text-center py-4">Loading stalls...</p>
    </div>
  </div>

  <!-- EDIT VENDOR MODAL (Hidden by default) -->
  <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9000; justify-content:center; align-items:center; padding: 16px;">
    <div class="bg-white p-6 rounded-3xl w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
      <h2 class="text-2xl font-bold mb-4 text-gray-800 border-b pb-2">✏️ Edit Stall</h2>
      
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold mb-1 text-gray-500">Stall ID (Cannot be changed)</label>
          <input type="text" id="edit-v-id" readonly class="p-3 border-2 border-gray-200 bg-gray-100 rounded-xl w-full text-gray-500 cursor-not-allowed">
        </div>
        
        <div>
          <label class="block text-xs font-bold mb-1 text-gray-600">Display Name</label>
          <input type="text" id="edit-v-name" class="p-3 border-2 border-gray-300 rounded-xl w-full focus:outline-none focus:border-red-500">
        </div>

        <div>
          <label class="block text-xs font-bold mb-1 text-gray-600">Staff Email</label>
          <input type="email" id="edit-v-email" class="p-3 border-2 border-blue-400 rounded-xl w-full focus:outline-none focus:border-blue-600">
        </div>
        
        <div class="bg-gray-50 p-3 border-2 border-gray-300 rounded-xl">
          <label class="block text-xs font-bold mb-1 text-gray-600">New Logo Image (Leave blank to keep current)</label>
          <input type="file" id="edit-v-logo" accept="image/*" class="w-full text-sm">
        </div>
        
        <div class="bg-gray-50 p-3 border-2 border-gray-300 rounded-xl">
          <label class="block text-xs font-bold mb-1 text-gray-600">New GCash QR Code (Leave blank to keep current)</label>
          <input type="file" id="edit-v-qr" accept="image/*" class="w-full text-sm">
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button onclick="closeEditModal()" class="w-1/3 bg-gray-200 hover:bg-gray-300 py-3 rounded-xl font-bold text-gray-700 transition-colors">Cancel</button>
        <button onclick="saveEditVendor()" id="btn-save-edit" class="w-2/3 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold text-white shadow-lg transition-colors">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Logout Modal -->
  <div id="logout-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:24px; border-radius:24px; width:80%; max-width:320px; text-align:center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);">
        <p style="color:black; font-weight:bold; font-size: 1.125rem; margin-bottom:24px;">Are you sure you want to log out?</p>
        <div style="display:flex; gap:12px;">
            <button onclick="hideLogoutModal()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#e5e7eb; color:#374151; font-weight:bold;">Cancel</button>
            <button onclick="confirmLogout()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#dc2626; color:white; font-weight:bold;">Yes, Logout</button>
        </div>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>

  <script>
    let cachedVendors = {}; // Stores vendor data temporarily so we can load it into the edit modal

    window.onload = () => {
      if (localStorage.getItem('role') !== 'admin') {
        window.location.href = 'login.html';
        return;
      }
      loadVendors();
    };

    // --- FETCH VENDORS ---
    async function loadVendors() {
      const list = document.getElementById('admin-vendor-list');
      cachedVendors = {}; // Reset cache
      
      try {
        const snapshot = await db.collection('vendors').get();
        
        if (snapshot.empty) {
          list.innerHTML = `<div class="text-center text-gray-500 py-8 bg-gray-50 rounded-xl border-2 border-dashed">No stalls found. Add one above!</div>`;
          return;
        }

        let html = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          cachedVendors[doc.id] = data; // Save to cache for editing

          html += `
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col sm:flex-row justify-between items-center hover:shadow-md transition-shadow gap-4">
              <div class="flex items-center gap-4 w-full overflow-hidden">
                <img src="${data.logoUrl || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-xl object-cover border-2 border-gray-100 flex-shrink-0">
                <div class="truncate w-full">
                  <h3 class="font-bold text-lg text-gray-800 truncate">${data.name}</h3>
                  <p class="text-xs text-gray-500">ID: <span class="font-mono text-blue-600">${doc.id}</span></p>
                  <p class="text-xs text-gray-500 truncate">Email: ${data.email}</p>
                </div>
              </div>
              
              <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="openEditModal('${doc.id}')" class="flex-1 sm:flex-none bg-blue-50 hover:bg-blue-100 text-blue-600 px-4 py-3 rounded-xl font-bold transition-colors">
                  ✏️ Edit
                </button>
                <button onclick="deleteVendor('${doc.id}')" class="flex-1 sm:flex-none bg-red-50 hover:bg-red-100 text-red-600 px-4 py-3 rounded-xl font-bold transition-colors">
                  🗑️ Delete
                </button>
              </div>
            </div>
          `;
        });
        list.innerHTML = html;
        
      } catch (error) {
        console.error("Error loading vendors:", error);
        list.innerHTML = `<div class="text-red-500 text-center py-4 font-bold">Error loading stalls from database.</div>`;
      }
    }

    // --- ADD VENDOR ---
    async function addVendor() {
      const id = document.getElementById('v-id').value.trim().toLowerCase();
      const name = document.getElementById('v-name').value.trim();
      const email = document.getElementById('v-email').value.trim().toLowerCase();
      const logoFile = document.getElementById('v-logo').files[0];
      const qrFile = document.getElementById('v-qr').files[0];

      if(!id || !name || !email || !logoFile || !qrFile) return alert("Please fill all fields and upload both images.");

      const btn = document.getElementById('btn-add-vendor');
      btn.innerText = "Saving to Database...";
      btn.disabled = true;

      try {
        const logoData = await compressImage(logoFile, 500);
        const qrData = await compressImage(qrFile, 500);

        await db.collection('vendors').doc(id).set({
          name: name,
          email: email,
          logoUrl: logoData,
          qrUrl: qrData
        });

        alert("Stall created successfully!");
        
        // Clear inputs
        ['v-id', 'v-name', 'v-email', 'v-logo', 'v-qr'].forEach(id => document.getElementById(id).value = '');
        
        loadVendors(); 
      } catch (e) {
        console.error(e);
        alert("Error creating stall.");
      } finally {
        btn.innerText = "Create Stall";
        btn.disabled = false;
      }
    }

    // --- EDIT VENDOR LOGIC ---
    function openEditModal(id) {
      const vendor = cachedVendors[id];
      if (!vendor) return alert("Error fetching vendor details.");

      document.getElementById('edit-v-id').value = id; // Cannot change ID
      document.getElementById('edit-v-name').value = vendor.name;
      document.getElementById('edit-v-email').value = vendor.email;
      
      // Clear file inputs (only update if user selects a new file)
      document.getElementById('edit-v-logo').value = '';
      document.getElementById('edit-v-qr').value = '';

      document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    async function saveEditVendor() {
      const id = document.getElementById('edit-v-id').value;
      const name = document.getElementById('edit-v-name').value.trim();
      const email = document.getElementById('edit-v-email').value.trim().toLowerCase();
      const logoFile = document.getElementById('edit-v-logo').files[0];
      const qrFile = document.getElementById('edit-v-qr').files[0];

      if (!name || !email) return alert("Name and Email cannot be empty.");

      const btn = document.getElementById('btn-save-edit');
      btn.innerText = "Saving...";
      btn.disabled = true;

      try {
        let updatePayload = { name: name, email: email };

        // If user uploaded a new image, compress it and add to payload. Otherwise, Firestore keeps the old one.
        if (logoFile) updatePayload.logoUrl = await compressImage(logoFile, 500);
        if (qrFile) updatePayload.qrUrl = await compressImage(qrFile, 500);

        await db.collection('vendors').doc(id).update(updatePayload);
        
        alert("Stall updated successfully!");
        closeEditModal();
        loadVendors(); // Refresh UI to show changes
      } catch (error) {
        console.error("Error updating vendor:", error);
        alert("Error updating stall.");
      } finally {
        btn.innerText = "Save Changes";
        btn.disabled = false;
      }
    }

    // --- DELETE VENDOR ---
    async function deleteVendor(vendorId) {
      if(confirm(`⚠️ Are you sure you want to delete stall "${vendorId}"? This action cannot be undone.`)) {
        try {
          await db.collection('vendors').doc(vendorId).delete();
          alert("Stall deleted successfully.");
          loadVendors();
        } catch (error) {
          console.error("Error deleting vendor:", error);
          alert("Error deleting stall.");
        }
      }
    }

    // --- COMPRESS IMAGE ---
    async function compressImage(file, maxWidth = 800) {
        return new Promise((resolve) => {
            const reader = new FileReader(); 
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image(); 
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.80));
                }
            }
        });
    }

    // --- MODAL CONTROLS ---
    function showLogoutModal() { document.getElementById('logout-modal').style.display = 'flex'; }
    function hideLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
    function confirmLogout() { localStorage.clear(); window.location.replace("login.html"); }
  </script>
</body>
</html>
