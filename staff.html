<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-20">
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl">
    
    <header class="bg-red-700 text-white p-6 text-center rounded-b-3xl">
      <h1 class="text-2xl font-bold uppercase" id="staff-title">Dashboard</h1>
    </header>

    <!-- Navigation Tabs -->
    <div class="flex justify-center gap-4 my-4 px-4">
      <button onclick="showTab('orders')" id="tab-orders" class="flex-1 py-2 font-bold bg-red-700 text-white rounded-xl">Orders</button>
      <button onclick="showTab('settings')" id="tab-settings" class="flex-1 py-2 font-bold bg-gray-200 text-gray-700 rounded-xl">Stall Settings</button>
    </div>

    <!-- ORDERS TAB -->
    <div id="view-orders" class="p-4 block">
      <div id="orders-list" class="space-y-4"></div>
    </div>

    <!-- SETTINGS / MENU TAB -->
    <div id="view-settings" class="p-4 hidden">
      
      <!-- Change QR Code -->
      <div class="bg-blue-50 p-4 rounded-2xl mb-6 border border-blue-100">
        <h2 class="font-bold text-blue-900 mb-2">Update GCash QR Code</h2>
        <input type="file" id="new-qr" accept="image/*" class="w-full mb-2 text-sm bg-white border p-2 rounded-lg">
        <button onclick="updateQR()" id="btn-qr" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Upload New QR</button>
      </div>

      <!-- Add Menu Item -->
      <div class="bg-gray-100 p-4 rounded-2xl mb-6 border border-gray-200">
        <h2 class="font-bold text-gray-800 mb-3">Add Menu Item</h2>
        <input type="text" id="item-name" placeholder="Food Name" class="w-full mb-2 p-3 rounded-lg border">
        <input type="number" id="item-price" placeholder="Price (₱)" class="w-full mb-2 p-3 rounded-lg border">
        <label class="text-xs font-bold text-gray-500 ml-1">Food Image</label>
        <input type="file" id="item-img" accept="image/*" class="w-full mb-3 p-2 rounded-lg border bg-white">
        <button onclick="addMenuItem()" id="btn-add-menu" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">Add to Menu</button>
      </div>

      <!-- Current Menu List -->
      <h2 class="font-bold text-gray-800 mb-3">Manage Current Menu</h2>
      <div id="staff-menu-list" class="space-y-3"></div>
      
    </div>

    <div class="fixed bottom-4 left-1/2 -translate-x-1/2">
      <button onclick="document.getElementById('logout-modal').style.display = 'flex'">
        🚪 Logout
      </button>
    </div>
  </div>
 
 <!-- CUSTOM ALERT MODAL -->
    <div id="custom-alert" style="display: none;" class="fixed inset-0 bg-black bg-opacity-80 z-[99999] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl transform transition-all">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">⚠️</span>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Notice</h3>
            <p id="custom-alert-message" class="text-gray-600 mb-6 text-sm leading-relaxed">Error message goes here.</p>
            <button onclick="closeCustomAlert()" class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-4 rounded-xl shadow-md transition-colors">
                OK
            </button>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  
  <script>

    // --- CUSTOM ALERT FUNCTIONS ---
    function showCustomAlert(message) {
        document.getElementById('custom-alert-message').innerText = message;
        document.getElementById('custom-alert').style.display = 'flex';
    }

    function closeCustomAlert() {
        document.getElementById('custom-alert').style.display = 'none';
    }

    const myVendorId = localStorage.getItem('vendorId');
    if(!myVendorId) window.location.href = 'login.html';

    document.getElementById('staff-title').textContent = myVendorId.toUpperCase();

    if (typeof AndroidInterface !== 'undefined' && AndroidInterface.requestBatteryExemption) {
        AndroidInterface.requestBatteryExemption();
    }

    // Tab Navigation Logic
    function showTab(tab) {
      document.getElementById('view-orders').style.display = tab === 'orders' ? 'block' : 'none';
      document.getElementById('view-settings').style.display = tab === 'settings' ? 'block' : 'none';
      
      document.getElementById('tab-orders').className = tab === 'orders' ? 'flex-1 py-2 font-bold bg-red-700 text-white rounded-xl' : 'flex-1 py-2 font-bold bg-gray-200 text-gray-700 rounded-xl';
      document.getElementById('tab-settings').className = tab === 'settings' ? 'flex-1 py-2 font-bold bg-red-700 text-white rounded-xl' : 'flex-1 py-2 font-bold bg-gray-200 text-gray-700 rounded-xl';
    }

    // Load Live Orders
let initialLoad = true; // Prevents notifying for old orders when the app first opens

    // Load Live Orders & Listen for New Ones
    db.collection("orders").where("vendorId", "==", myVendorId).onSnapshot(snapshot => {
      
      // 1. CHECK FOR NEW ORDERS (For Notifications)
      snapshot.docChanges().forEach(change => {
          if (change.type === "added" && !initialLoad) {
              const newOrder = change.doc.data();
              // Trigger Android Notification over TikTok
              if (typeof AndroidInterface !== 'undefined') {
                  AndroidInterface.triggerAndroidNotification(
                      "🔔 NEW ORDER RECEIVED!", 
                      "Student " + newOrder.studentNumber + " sent ₱" + newOrder.total.toFixed(2)
                  );
              } else {
                  showCustomAlert("New Order Received!");
              }
          }
      });
      initialLoad = false; // Initial load is done

      // 2. RENDER THE ORDERS LIST
      const ordersList = document.getElementById('orders-list');
      ordersList.innerHTML = "";
      if (snapshot.empty) return ordersList.innerHTML = "<p class='text-center text-gray-500 mt-10'>No orders yet.</p>";
      
      let docs = [];
      snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
      docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

      docs.forEach(order => {
        let itemsList = order.items.map(i => `${i.qty}x ${i.name}`).join('<br>');
        
        let actionButtons = "";
        if (order.status === "pending") {
          actionButtons = `
            <div class="flex gap-2 mt-4">
              <button onclick="updateStatus('${order.id}', 'accepted')" class="flex-1 bg-green-600 text-white py-2 rounded-xl font-bold">✅ Accept</button>
              <button onclick="updateStatus('${order.id}', 'declined')" class="flex-1 bg-red-100 text-red-700 py-2 rounded-xl font-bold">❌ Decline</button>
            </div>`;
        } else {
          actionButtons = `
            <button onclick="deleteOrder('${order.id}')" class="w-full mt-4 bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 rounded-xl text-sm font-bold shadow-sm">
              🗑️ Remove Order from History
            </button>`;
        }

        ordersList.innerHTML += `
          <div class="border-2 p-4 rounded-2xl bg-white mb-4 ${order.status === 'pending' ? 'border-orange-300 shadow-lg' : 'border-gray-100'}">
            <p class="font-bold">Student: ${order.studentNumber}</p>
            <p class="text-sm text-gray-500 mb-2">Status: <b class="uppercase">${order.status}</b></p>
            <div class="bg-gray-50 p-2 rounded text-sm">${itemsList}</div>
            <p class="font-bold text-red-700 mt-2">Total: ₱${order.total.toFixed(2)}</p>
            <div class="mt-2 text-center bg-gray-100 p-2 rounded">
              <p class="text-xs mb-1 font-bold text-gray-600">Proof of Payment</p>
              <img src="${order.receiptUrl}" class="h-32 object-cover mx-auto cursor-pointer rounded-lg border" onclick="window.open('${order.receiptUrl}')">
            </div>
            ${actionButtons}
          </div>
        `;
      });
    });

    function updateStatus(id, status) { 
      if(status === 'declined' && !confirm("Decline this order?")) return;
      db.collection("orders").doc(id).update({ status: status }); 
    }

    async function deleteOrder(id) {
      if(confirm("Are you sure you want to remove this order from your list?")) {
        await db.collection("orders").doc(id).delete();
      }
    }

    // --- COMPRESSION FUNCTION (FROM YOUR STOREZ CODE) ---
    async function compressImage(file, maxWidth = 600) {
        return new Promise((resolve) => {
            const reader = new FileReader(); 
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image(); 
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; 
                    let height = img.height;
                    if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                    canvas.width = width; 
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true; 
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.80));
                }
            }
        });
    }

    // --- ADD MENU ITEM ---
    async function addMenuItem() {
      const name = document.getElementById('item-name').value;
      const price = parseFloat(document.getElementById('item-price').value);
      const file = document.getElementById('item-img').files[0];

      if(!name || !price || !file) return showCustomAlert("Fill all fields and select an image.");
      
      const btn = document.getElementById('btn-add-menu');
      btn.innerText = "Compressing & Saving...";
      btn.disabled = true;

      try {
        // Compress image to Base64 text
        const imgData = await compressImage(file);
        
        // Save to Firestore
        await db.collection('menu').add({
          vendorId: myVendorId,
          name: name,
          price: price,
          imageUrl: imgData // Saved as compressed text!
        });
        
        showCustomAlert("Item added successfully!");
        document.getElementById('item-name').value = '';
        document.getElementById('item-price').value = '';
        document.getElementById('item-img').value = '';
      } catch(e) { 
        showCustomAlert("Error adding item: " + e.message); 
      }

      btn.innerText = "Add to Menu";
      btn.disabled = false;
    }

    // --- UPDATE QR CODE ---
    async function updateQR() {
      const file = document.getElementById('new-qr').files[0];
      if(!file) return showCustomAlert("Select an image first.");
      
      const btn = document.getElementById('btn-qr');
      btn.innerText = "Updating...";
      btn.disabled = true;

      try {
        // Compress QR image to Base64 text
        const qrData = await compressImage(file, 500);
        
        // Update Firestore
        await db.collection('vendors').doc(myVendorId).update({ qrUrl: qrData });
        showCustomAlert("QR Code Updated Successfully!");
        document.getElementById('new-qr').value = '';
      } catch(e) { 
        showCustomAlert("Error updating QR."); 
      }
      
      btn.innerText = "Upload New QR";
      btn.disabled = false;
    }

function logout() {
  if (confirm("Are you sure you want to log out?")) {
    localStorage.clear();
    
    if (typeof Android !== 'undefined') {
        window.location.href = "login.html"; 
    } else {
        window.location.href = "login.html";
    }
    setTimeout(() => {
        window.location.replace("login.html");
    }, 100);
  }
}

// Function to show the custom modal
function showLogoutModal() {
    document.getElementById('logout-modal').style.display = 'flex';
}

// Function to hide the custom modal
function hideLogoutModal() {
    document.getElementById('logout-modal').style.display = 'none';
}

// Actual logout logic
function confirmLogout() {
    localStorage.clear();
    // Use window.location.replace to prevent Android from getting stuck
    window.location.replace("login.html");
}


  </script>
  <div id="logout-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:20px; width:80%; max-width:300px; text-align:center;">
        <p style="color:black; font-weight:bold; margin-bottom:20px;">Are you sure you want to log out?</p>
        <div style="display:flex; gap:10px;">
            <button onclick="hideLogoutModal()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#ccc;">Cancel</button>
            <button onclick="confirmLogout()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#dc2626; color:white;">Yes</button>
        </div>
    </div>
</div>
</body>
</html>
